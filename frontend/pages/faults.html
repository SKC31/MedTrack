<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>MedTrack — Fault Reports</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="topbar">
      <div class="topbar-left"><div class="page-title">Fault Reports</div></div>
      <div class="topbar-right">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search faults…"/>
        </div>
        <button class="btn btn-danger" id="btnAdd">⚠️ Report Fault</button>
      </div>
    </div>

    <div class="card" style="margin:20px 28px">
      <div class="filter-bar">
        <select id="filterSeverity">
          <option value="">All Severities</option>
          <option>Low</option><option>Medium</option>
          <option>High</option><option>Critical</option>
        </select>
        <select id="filterStatus">
          <option value="">All Statuses</option>
          <option>Open</option><option>Resolved</option><option>Closed</option>
        </select>
        <div class="filter-sep"></div>
        <span id="countLabel" style="font-size:12px;color:var(--text-muted)"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Equipment</th>
              <th>Description</th>
              <th>Reported By</th>
              <th>Severity</th>
              <th>Status</th>
              <th>Date</th>
              <th style="width:80px">Actions</th>
            </tr>
          </thead>
          <tbody id="faultsTable">
            <tr><td colspan="7"><div class="spinner-wrap"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Report fault modal -->
<div class="modal-overlay" id="faultModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Report a Fault</div>
      <button class="modal-close" onclick="closeModal('faultModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Equipment <span class="required">*</span></label>
        <select class="form-control" id="fEquipment"></select>
      </div>
      <div class="form-group">
        <label>Description <span class="required">*</span></label>
        <textarea class="form-control" id="fDesc" rows="3" placeholder="Describe the fault clearly…"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Reported By <span class="required">*</span></label>
          <input class="form-control" id="fReportedBy" placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label>Severity <span class="required">*</span></label>
          <select class="form-control" id="fSeverity">
            <option>Low</option><option selected>Medium</option>
            <option>High</option><option>Critical</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('faultModal')">Cancel</button>
      <button class="btn btn-danger" id="btnSubmit">Submit Report</button>
    </div>
  </div>
</div>

<!-- Update status modal (admin) -->
<div class="modal-overlay" id="statusModal">
  <div class="modal modal-sm">
    <div class="modal-header">
      <div class="modal-title">Update Fault Status</div>
      <button class="modal-close" onclick="closeModal('statusModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="statusId"/>
      <div class="form-group">
        <label>New Status</label>
        <select class="form-control" id="fNewStatus">
          <option>Open</option><option>Resolved</option><option>Closed</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('statusModal')">Cancel</button>
      <button class="btn btn-primary" id="btnUpdateStatus">Update</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/sidebar.js"></script>
<script>
requireAuth();
const isAdmin = getRole() === 'admin';
let allFaults = [];

async function load() {
  try {
    allFaults = await api.getFaults();
    applyFilters();
  } catch(err) { showToast(err.message, 'error'); }
}

function applyFilters() {
  const q    = document.getElementById('searchInput').value.toLowerCase();
  const sev  = document.getElementById('filterSeverity').value;
  const stat = document.getElementById('filterStatus').value;
  const rows = allFaults.filter(f =>
    (!q    || (f.equipment_name||'').toLowerCase().includes(q) || f.description.toLowerCase().includes(q) || f.reported_by.toLowerCase().includes(q)) &&
    (!sev  || f.severity === sev) &&
    (!stat || f.status   === stat)
  );
  document.getElementById('countLabel').textContent = `${rows.length} of ${allFaults.length} reports`;
  renderTable(rows);
}

function renderTable(rows) {
  const tbody = document.getElementById('faultsTable');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">✅</div><h3>No fault reports</h3><p>No faults match your filters</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(f => `
    <tr>
      <td class="td-name">${f.equipment_name || 'Equipment #'+f.equipment_id}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-muted)">${f.description}</td>
      <td>${f.reported_by}</td>
      <td>${statusBadge(f.severity)}</td>
      <td>${statusBadge(f.status)}</td>
      <td style="font-size:12px;color:var(--text-muted)">${fmtDate(f.created_at)}</td>
      <td class="td-actions">
        ${isAdmin ? `<button class="btn btn-ghost btn-icon btn-icon sm" title="Update status" onclick="openStatusModal(${f.id},'${f.status}')">🔄</button>` : '—'}
      </td>
    </tr>`).join('');
}

document.getElementById('btnAdd').addEventListener('click', async () => {
  try {
    const equipment = await api.getEquipment();
    document.getElementById('fEquipment').innerHTML = equipment.map(e =>
      `<option value="${e.id}">${e.name} — ${e.department}</option>`).join('');
  } catch(_) {}
  document.getElementById('fDesc').value       = '';
  document.getElementById('fReportedBy').value = getUserName();
  document.getElementById('fSeverity').value   = 'Medium';
  openModal('faultModal');
});

document.getElementById('btnSubmit').addEventListener('click', async () => {
  const data = {
    equipment_id: parseInt(document.getElementById('fEquipment').value),
    description:  document.getElementById('fDesc').value.trim(),
    reported_by:  document.getElementById('fReportedBy').value.trim(),
    severity:     document.getElementById('fSeverity').value,
  };
  if (!data.equipment_id || !data.description || !data.reported_by)
    return showToast('All fields are required.', 'warning');
  try {
    await api.createFault(data);
    showToast('Fault reported successfully!');
    closeModal('faultModal');
    load();
  } catch(err) { showToast(err.message, 'error'); }
});

function openStatusModal(id, current) {
  document.getElementById('statusId').value = id;
  document.getElementById('fNewStatus').value = current;
  openModal('statusModal');
}

document.getElementById('btnUpdateStatus').addEventListener('click', async () => {
  const id     = document.getElementById('statusId').value;
  const status = document.getElementById('fNewStatus').value;
  try {
    await api.updateFaultStatus(id, status);
    showToast('Status updated!');
    closeModal('statusModal');
    load();
  } catch(err) { showToast(err.message, 'error'); }
});

document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('filterSeverity').addEventListener('change', applyFilters);
document.getElementById('filterStatus').addEventListener('change', applyFilters);
load();
</script>
</body>
</html>
